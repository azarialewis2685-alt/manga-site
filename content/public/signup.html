        <a href="index.html">Home</a>

        <a href="mangaDetails.html">Random</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- HEADER -->
    <header>
        <div id="logo" class="nav-links">
            <span class="material-symbols-outlined" id="menu" onclick="openMenu()">menu</span>
            <span class="material-symbols-outlined" id="bkm-logo">collections_bookmark</span>
            <a href="index.html"><h1>Manga<span class="accent-color">Scribe</span></h1></a>

                <button class="primary-btn">SIGN UP</button>

            <a href="login.html">
                <button class="secondary-btn">LOG IN</button>
            </a>
        </div>
    </header>
    <hr>

    <div class="site">
        <!-- MAIN -->
        <main>
            <div class="contact-box">
                <h2>Sign Up</h2>

                <input id="newUser" placeholder="Username or Email"><br><br>
                <input id="newPass" type="password" placeholder="Password"><br><br>

                <button class="primary-btn" onclick="signup()">Sign Up</button>

                <p>Already have an account? <a href="login.html"><span class="accent-color"> Log in</span></a></p>

    </div>

<script>

function openMenu(){
    document.getElementById("sidebar").style.left = "0";
}
window.onclick = function(event) {
    let sidebar = document.getElementById("sidebar");
    let menuBtn = document.getElementById("menu");

    if (
        event.target !== sidebar &&
        !sidebar.contains(event.target) &&
        event.target !== menuBtn
    ) {
        sidebar.style.left = "-250px";
    }
}

function closeMenu(){
    document.getElementById("sidebar").style.left = "-250px";
}


function signup(){

    // simulate account creation
    alert("Account created successfully");

    // automatically log them in
    localStorage.setItem("loggedIn", "true");

    // redirect back to main page
    window.location.href = "index.html";
}
</script>

</body>
