<script>
    let link = document.getElementsByClassName('link');
    let currValue = 1;
  getPage(currValue);

    function active(){
        for (l of link){
            l.classList.remove("active");
        }
        event.target.classList.add("active");
        currValue = event.target.value;
        getPage(currValue);
    }

    function prev(){
        if (currValue > 1){
            for(l of link){
                l.classList.remove("active");
            }
            currValue --;
            link[currValue-1].classList.add("active");
        }
        getPage(currValue);
    }

    function next(){
        let count = 0;
        for (l of link){
            count++;
        }
        if (currValue < count){
            for(l of link){
                l.classList.remove("active");
            }
            currValue ++;
            link[currValue-1].classList.add("active");
        }
        getPage(currValue)
    }

    let allManga = [];
// Here we define our query as a multi-line string
// Storing it in a separate .graphql/.gql file is also possible
function getPage(val){
let query = `
query (
  $page: Int = ${val}
  $type: MediaType
) {
  Page(page: $page, perPage:30 ) {
    pageInfo {
      hasNextPage
    }
   media(type: $type) {
  id
  title {
    romaji
    english
    native
  }
  description
  genres
  coverImage {
    extraLarge
  }
}
  }
}
`;

// Define our query variables and values that will be used in the query request
const variables = {
    type: 'MANGA',
};

// Define the config we'll need for our Api request
let url = 'https://graphql.anilist.co',
    options = {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
        },
        body: JSON.stringify({
            query: query,
            variables: variables
        })
    };

// Make the HTTP Api request
fetch(url, options).then(handleResponse)
    .then(handleData)
    .catch(handleError);
    console.log(options);
}


function handleResponse(response) {
    return response.json().then(function (json) {
        return response.ok ? json : Promise.reject(json);
    });
}


function handleData(data) {
    console.log(data);
    showData(data);
}

function handleError(error) {
    alert('Error, check console');
    console.error(error);
}function openMenu(){
    document.getElementById("sidebar").style.left = "0";
}
window.onclick = function(event) {
    let sidebar = document.getElementById("sidebar");
    let menuBtn = document.getElementById("menu");

    if (
        event.target !== sidebar &&
        !sidebar.contains(event.target) &&
        event.target !== menuBtn
    ) {
        sidebar.style.left = "-250px";
    }
}

function closeMenu(){
    document.getElementById("sidebar").style.left = "-250px";
}


function showData(records){
    let array = records.data.Page.media;

    allManga = array;

    renderManga(array); 
}
function renderManga(array){
    let result = document.querySelector('#page');
    let html = '';

    for (let rec of array){

       
        let cleanDesc = (rec.description || "")
            .replace(/<[^>]+>/g, "")
            .replace(/["'`]/g, "")
            .substring(0, 120);

        let genres = rec.genres ? rec.genres.slice(0, 3).join(", ") : "";

        html += `
        <div class="card">

            <figure class="manga-card"
                onmouseenter="showPreviewCard(this, '${cleanDesc}', '${genres}', '${rec.coverImage?.extraLarge}')"
                onmouseleave="hidePreviewCard(this)">

              
                <a href="mangaDetails.html?id=${rec.id}">
                    <img src="${rec.coverImage?.extraLarge || 'https://via.placeholder.com/150x200'}">
                </a>

                <figcaption>
                    <ul>
                        <li class="card-title">${rec.title.romaji}</li>
                        <li>${rec.title.english || ''}</li>
                    </ul>

                    <button onclick="addBookmark(${rec.id})">
                        Bookmark
                    </button>
                </figcaption>

                <!--  HOVER CARD -->
                <div class="hover-card"></div>

            </figure>

        </div>`;
    }

    result.innerHTML = html;
}
function showPreview(e, text){
    let box = document.getElementById("previewBox");

    if(!text) return;

    box.innerHTML = text + "...";
    box.style.display = "block";

    // safer positioning
    box.style.top = (e.clientY + 15) + "px";
    box.style.left = (e.clientX + 15) + "px";
}
function hidePreview(){
    document.getElementById("previewBox").style.display = "none";
}
    function searchManga(){
    let query = document.getElementById("searchInput").value.toLowerCase();

    let filtered = allManga.filter(manga => 
        manga.title.romaji.toLowerCase().includes(query) ||
        (manga.title.english && manga.title.english.toLowerCase().includes(query))
    );
if(filtered.length === 0){
    document.querySelector('#page').innerHTML = "<p>No manga found</p>";
    return;
}
    renderManga(filtered);
}
function showPreviewCard(element, desc, genres, image, id){

    let card = element.querySelector(".hover-card");

    
    if (desc && desc.trim() !== "") {

        card.innerHTML = `
            <img src="${image}" style="width:100%; height:120px; object-fit:cover; border-radius:6px;">
            <p><b>Genre:</b> ${genres || "N/A"}</p>
            <p><b>Synopsis:</b> ${desc}...</p>
        `;

        card.style.display = "block";
        return;
    }

    // (BOOKMARKS) → FETCH DATa
    card.innerHTML = "Loading...";
    card.style.display = "block";

    fetch("https://graphql.anilist.co", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            query: `
            query ($id: Int){
                Media(id: $id){
                    description
                    genres
                }
            }`,
            variables: { id: Number(id) }
        })
    })
    .then(res => res.json())
    .then(data => {

        let m = data?.data?.Media;

        let clean = (m?.description || "No description available")
            .replace(/<[^>]+>/g, "")
            .replace(/\s+/g, " ")
            .substring(0, 120);

        card.innerHTML = `
            <img src="${image}" style="width:100%; height:120px; object-fit:cover; border-radius:6px;">
            <p><b>Genre:</b> ${(m?.genres || []).join(", ") || "N/A"}</p>
            <p><b>Synopsis:</b> ${clean}...</p>
        `;
    });
}

function hidePreviewCard(element){
    let card = element.querySelector(".hover-card");
    card.style.display = "none";
}

async function loggedIn(){
    let res = document.querySelector('#bkm');
    let html = `<h2>Your Bookmarks</h2><hr>`;
    if( await localStorage.getItem("loggedIn") !== "true"){
    
    html += `<div class="no-bkmarks">
                <p><span class="accent-color">Log in</span> to view you bookmarks <br>or <span class="accent-color">Sign up</span> to start bookmarking</p>
                <div>
                    <a href="signup.html"><button class="primary-btn">SIGN UP</button></a> 
                    <a href="login.html"><button class="secondary-btn">LOG IN</button></a>
                </div>
            </div>`;
    res.innerHTML = html;
    }
    else{
        displayBookmarks();
    }
}
loggedIn();
function addBookmark(id) {

    if(localStorage.getItem("loggedIn") !== "true"){
        alert("Please log in to bookmark manga");
        return;
    }

    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];

    
    let manga = allManga.find(m => m.id == id);

    if (!manga) return;

    let exists = bookmarks.some(item => item.id == manga.id);

    if (!exists) {

        let newBookmark = {
            id: manga.id,
            title: manga.title,
            coverImage: manga.coverImage?.extraLarge || ''
        };

        bookmarks.push(newBookmark);

        localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        alert("Bookmarked!");

    } else {
        alert("Already bookmarked!");
    }

    displayBookmarks();
}

function displayBookmarks() {
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
    let section = document.querySelector('#bkm');

    let html = `<h2>Your Bookmarks</h2><hr>`;

    if (bookmarks.length === 0) {
        html += `<p>No bookmarks yet</p>`;
    } else {

        html += `<div style="display:flex; flex-wrap:wrap; justify-content:center;">`;

        for (let m of bookmarks) {

            let cleanDesc = ""; // bookmarks don’t store description
            let genres = "";

            html += `
            <div class="card">

                <figure class="manga-card"
                  onmouseenter="showPreviewCard(this, '', '', '${m.coverImage}', ${m.id})"
                    onmouseleave="hidePreviewCard(this)">

                    
                    <a href="mangaDetails.html?id=${m.id}">
                        <img src="${m.coverImage || 'https://via.placeholder.com/150x200'}">
                    </a>

                    <figcaption>
                        <ul>
                            <li class="card-title">${m.title?.romaji}</li>
                        </ul>

                        <button onclick="removeBookmark(${m.id})">
                            Remove
                        </button>
                    </figcaption>

                    <!--  HOVER -->
                    <div class="hover-card"></div>

                </figure>

            </div>`;
        }

        html += `</div>`;
    }

    section.innerHTML = html;
}
    
function removeBookmark(id) {
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];

    bookmarks = bookmarks.filter(item => item.id !== id);

    localStorage.setItem('bookmarks', JSON.stringify(bookmarks));

    displayBookmarks();
}
    window.onload = function(){
    document.getElementById("searchInput").addEventListener("input", searchManga);
};
    displayBookmarks();
</script>
