<script>
function openMenu(){
    document.getElementById("sidebar").style.left = "0";
}
window.onclick = function(event) {
    let sidebar = document.getElementById("sidebar");
    let menuBtn = document.getElementById("menu");

    if (
        event.target !== sidebar &&
        !sidebar.contains(event.target) &&
        event.target !== menuBtn
    ) {
        sidebar.style.left = "-250px";
    }
}

function closeMenu(){
    document.getElementById("sidebar").style.left = "-250px";
}


const params = new URLSearchParams(window.location.search);
const id = params.get("id");



const query = `
query ($id: Int) {
  Media(id: $id, type: MANGA) {
    title { romaji english }
    description
    status
    chapters
    averageScore
    coverImage { extraLarge }
  }
}
`;;

//  FETCH DATA
fetch('https://graphql.anilist.co', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
        query: query,
        variables: { id: parseInt(id) }
    })
})
.then(res=>res.json())
.then(data=>{
    let manga = data.data.Media;
    document.getElementById("status").innerText = manga.status || "N/A";
document.getElementById("chapters").innerText = manga.chapters || "N/A";
document.getElementById("score").innerText = manga.averageScore || "N/A";

    // SET TITLE
    document.getElementById("title").innerText =
        manga.title.english || manga.title.romaji;

    // SET IMAGE
    document.getElementById("image").src =
        manga.coverImage.extraLarge;

    // CLEAN DESCRIPTION
    let cleanDesc = (manga.description || "")
        .replace(/<[^>]+>/g, "")
        .replace(/\s+/g, " ");

    document.getElementById("description").innerText = cleanDesc;
});

//  BACK BUTTON
function goBack(){
    window.history.back();
}

</script>
